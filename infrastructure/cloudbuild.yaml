# MaternaSquad Cloud Build pipeline.
# Run via: .\infrastructure\deploy.ps1
# Substitutions passed by deploy.ps1: _REGION, _REPO
#
# All Docker work runs in one bash step to avoid inter-step daemon issues.
# gcloud deploy steps follow after images are pushed.

substitutions:
  _REGION: europe-west4
  _REPO: maternasquad

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 3600s

steps:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Step 1: Build and push all 7 images in a single bash session.
  # Sequential builds share the pip layer cache so agent images are fast.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: build-and-push-images
    name: gcr.io/cloud-builders/docker
    timeout: 2400s
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        REG="europe-west4-docker.pkg.dev/$PROJECT_ID/maternasquad"

        echo ">>> Pulling base images..."
        docker pull python:3.11-slim
        docker pull hapiproject/hapi:latest

        echo ">>> HAPI mirror..."
        docker tag hapiproject/hapi:latest "$$REG/maternasquad-hapi:latest"
        docker push "$$REG/maternasquad-hapi:latest"

        echo ">>> MCP server..."
        docker build -f infrastructure/Dockerfile.mcp \
          -t "$$REG/maternasquad-mcp:latest" .
        docker push "$$REG/maternasquad-mcp:latest"

        echo ">>> Risk agent..."
        docker build -f infrastructure/Dockerfile.agent \
          --build-arg AGENT_MODULE=a2a_agents.risk_agent.agent \
          --build-arg AGENT_PORT=8080 \
          -t "$$REG/maternasquad-risk-agent:latest" .
        docker push "$$REG/maternasquad-risk-agent:latest"

        echo ">>> Coverage agent..."
        docker build -f infrastructure/Dockerfile.agent \
          --build-arg AGENT_MODULE=a2a_agents.coverage_agent.agent \
          --build-arg AGENT_PORT=8080 \
          -t "$$REG/maternasquad-coverage-agent:latest" .
        docker push "$$REG/maternasquad-coverage-agent:latest"

        echo ">>> Education agent..."
        docker build -f infrastructure/Dockerfile.agent \
          --build-arg AGENT_MODULE=a2a_agents.education_agent.agent \
          --build-arg AGENT_PORT=8080 \
          -t "$$REG/maternasquad-education-agent:latest" .
        docker push "$$REG/maternasquad-education-agent:latest"

        echo ">>> Postpartum watch agent..."
        docker build -f infrastructure/Dockerfile.agent \
          --build-arg AGENT_MODULE=a2a_agents.postpartum_watch.agent \
          --build-arg AGENT_PORT=8080 \
          -t "$$REG/maternasquad-postpartum-watch:latest" .
        docker push "$$REG/maternasquad-postpartum-watch:latest"

        echo ">>> Orchestrator..."
        docker build -f infrastructure/Dockerfile.agent \
          --build-arg AGENT_MODULE=a2a_agents.orchestrator.agent \
          --build-arg AGENT_PORT=8080 \
          -t "$$REG/maternasquad-orchestrator:latest" .
        docker push "$$REG/maternasquad-orchestrator:latest"

        echo ">>> All images pushed."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Step 2: Deploy HAPI with min-instances=1 to keep Synthea data in memory.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: deploy-hapi
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [build-and-push-images]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - maternasquad-hapi
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/maternasquad-hapi:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=1
      - --memory=2Gi
      - --cpu=2
      - --port=8080
      - --timeout=300
      - --quiet

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Step 3: Load Synthea FHIR bundles into HAPI (two-pass: refs then patients).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: load-synthea
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-hapi]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        HAPI_URL=$(gcloud run services describe maternasquad-hapi \
          --region=${_REGION} --format='value(status.url)' --quiet)
        FHIR_BASE="$$HAPI_URL/fhir"
        echo "$$HAPI_URL" > /workspace/hapi_url.txt
        echo "HAPI URL: $$HAPI_URL"

        echo "Waiting for HAPI (up to 5 min)..."
        for i in $(seq 1 30); do
          if curl -sf "$$FHIR_BASE/metadata" > /dev/null 2>&1; then
            echo "HAPI ready after $$i checks."
            break
          fi
          echo "  attempt $$i/30, sleeping 10s..."
          sleep 10
        done
        curl -sf "$$FHIR_BASE/metadata" > /dev/null \
          || { echo "HAPI never became ready. Exiting."; exit 1; }

        BUNDLE_DIR="synthea/output/fhir"
        if [ ! -d "$$BUNDLE_DIR" ]; then
          echo "ERROR: $$BUNDLE_DIR missing from build context."
          echo "Run .\synthea\generate_personas.ps1 locally first."
          exit 1
        fi

        shopt -s nullglob

        echo "Pass 1: reference resources..."
        for f in "$$BUNDLE_DIR"/hospitalInformation*.json \
                  "$$BUNDLE_DIR"/practitionerInformation*.json; do
          echo "  $$f"
          curl -sf -X POST "$$FHIR_BASE" \
            -H 'Content-Type: application/fhir+json' \
            --data-binary "@$$f" > /dev/null
        done

        echo "Pass 2: patient bundles..."
        for f in "$$BUNDLE_DIR"/*.json; do
          [[ "$$f" == *hospitalInformation* ]] && continue
          [[ "$$f" == *practitionerInformation* ]] && continue
          echo "  $$f"
          curl -sf -X POST "$$FHIR_BASE" \
            -H 'Content-Type: application/fhir+json' \
            --data-binary "@$$f" > /dev/null
        done
        echo "Synthea bundles loaded."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Step 4: Deploy MCP server (knows HAPI URL).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: deploy-mcp
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [load-synthea]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        HAPI_URL=$(cat /workspace/hapi_url.txt)
        gcloud run deploy maternasquad-mcp \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/maternasquad-mcp:latest \
          --region=${_REGION} --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 --max-instances=5 \
          --memory=1Gi --cpu=1 --port=8080 --timeout=120 \
          --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
          --set-env-vars="FHIR_BASE_URL=$$HAPI_URL/fhir,MCP_SERVER_PORT=8080,CLAUDE_MODEL=claude-sonnet-4-6" \
          --quiet
        MCP_URL=$(gcloud run services describe maternasquad-mcp \
          --region=${_REGION} --format='value(status.url)' --quiet)
        echo "$$MCP_URL" > /workspace/mcp_url.txt
        echo "MCP: $$MCP_URL"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Step 5: Deploy 4 sub-agents in parallel (all need MCP URL).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: deploy-risk-agent
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-mcp]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        MCP_URL=$(cat /workspace/mcp_url.txt)
        gcloud run deploy maternasquad-risk-agent \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/maternasquad-risk-agent:latest \
          --region=${_REGION} --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 --max-instances=5 \
          --memory=512Mi --cpu=1 --port=8080 --timeout=120 \
          --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
          --set-env-vars="MCP_BASE_URL=$$MCP_URL,RISK_AGENT_PORT=8080,CLAUDE_MODEL=claude-sonnet-4-6" \
          --quiet
        URL=$(gcloud run services describe maternasquad-risk-agent \
          --region=${_REGION} --format='value(status.url)' --quiet)
        echo "$$URL" > /workspace/risk_url.txt
        echo "Risk: $$URL"

  - id: deploy-coverage-agent
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-mcp]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        MCP_URL=$(cat /workspace/mcp_url.txt)
        gcloud run deploy maternasquad-coverage-agent \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/maternasquad-coverage-agent:latest \
          --region=${_REGION} --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 --max-instances=5 \
          --memory=512Mi --cpu=1 --port=8080 --timeout=120 \
          --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
          --set-env-vars="MCP_BASE_URL=$$MCP_URL,COVERAGE_AGENT_PORT=8080,CLAUDE_MODEL=claude-sonnet-4-6" \
          --quiet
        URL=$(gcloud run services describe maternasquad-coverage-agent \
          --region=${_REGION} --format='value(status.url)' --quiet)
        echo "$$URL" > /workspace/coverage_url.txt
        echo "Coverage: $$URL"

  - id: deploy-education-agent
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-mcp]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        MCP_URL=$(cat /workspace/mcp_url.txt)
        gcloud run deploy maternasquad-education-agent \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/maternasquad-education-agent:latest \
          --region=${_REGION} --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 --max-instances=5 \
          --memory=512Mi --cpu=1 --port=8080 --timeout=120 \
          --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
          --set-env-vars="MCP_BASE_URL=$$MCP_URL,EDUCATION_AGENT_PORT=8080,CLAUDE_MODEL=claude-sonnet-4-6" \
          --quiet
        URL=$(gcloud run services describe maternasquad-education-agent \
          --region=${_REGION} --format='value(status.url)' --quiet)
        echo "$$URL" > /workspace/education_url.txt
        echo "Education: $$URL"

  - id: deploy-postpartum-watch
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-mcp]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        MCP_URL=$(cat /workspace/mcp_url.txt)
        gcloud run deploy maternasquad-postpartum-watch \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/maternasquad-postpartum-watch:latest \
          --region=${_REGION} --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 --max-instances=5 \
          --memory=512Mi --cpu=1 --port=8080 --timeout=120 \
          --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
          --set-env-vars="MCP_BASE_URL=$$MCP_URL,POSTPARTUM_WATCH_PORT=8080,CLAUDE_MODEL=claude-sonnet-4-6" \
          --quiet
        URL=$(gcloud run services describe maternasquad-postpartum-watch \
          --region=${_REGION} --format='value(status.url)' --quiet)
        echo "$$URL" > /workspace/postpartum_url.txt
        echo "Postpartum: $$URL"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Step 6: Deploy orchestrator with all sub-agent URLs wired in.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: deploy-orchestrator
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor:
      - deploy-risk-agent
      - deploy-coverage-agent
      - deploy-education-agent
      - deploy-postpartum-watch
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        MCP_URL=$(cat /workspace/mcp_url.txt)
        RISK_URL=$(cat /workspace/risk_url.txt)
        COVERAGE_URL=$(cat /workspace/coverage_url.txt)
        EDUCATION_URL=$(cat /workspace/education_url.txt)
        POSTPARTUM_URL=$(cat /workspace/postpartum_url.txt)

        gcloud run deploy maternasquad-orchestrator \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/maternasquad-orchestrator:latest \
          --region=${_REGION} --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 --max-instances=5 \
          --memory=512Mi --cpu=1 --port=8080 --timeout=180 \
          --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
          "--set-env-vars=MCP_BASE_URL=$$MCP_URL,ORCHESTRATOR_PORT=8080,CLAUDE_MODEL=claude-sonnet-4-6,RISK_AGENT_URL=$$RISK_URL/invoke,COVERAGE_AGENT_URL=$$COVERAGE_URL/invoke,EDUCATION_AGENT_URL=$$EDUCATION_URL/invoke,POSTPARTUM_WATCH_URL=$$POSTPARTUM_URL/invoke" \
          --quiet

        ORCH_URL=$(gcloud run services describe maternasquad-orchestrator \
          --region=${_REGION} --format='value(status.url)' --quiet)
        echo ""
        echo "=== All 7 services deployed ==="
        echo "  HAPI:             $(cat /workspace/hapi_url.txt)"
        echo "  MCP:              $$MCP_URL"
        echo "  Orchestrator:     $$ORCH_URL"
        echo "  Risk agent:       $$RISK_URL"
        echo "  Coverage agent:   $$COVERAGE_URL"
        echo "  Education agent:  $$EDUCATION_URL"
        echo "  Postpartum watch: $$POSTPARTUM_URL"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Step 7: Force public access on every service.
  # --allow-unauthenticated above is unreliable from the cloud-sdk builder,
  # so we set IAM explicitly here. Idempotent.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: make-public
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-orchestrator]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        for svc in maternasquad-hapi \
                   maternasquad-mcp \
                   maternasquad-risk-agent \
                   maternasquad-coverage-agent \
                   maternasquad-education-agent \
                   maternasquad-postpartum-watch \
                   maternasquad-orchestrator; do
          echo ">>> granting allUsers/run.invoker on $$svc"
          gcloud run services add-iam-policy-binding "$$svc" \
            --region=${_REGION} \
            --member=allUsers \
            --role=roles/run.invoker \
            --quiet > /dev/null
        done
        echo "All services are now publicly invokable."
